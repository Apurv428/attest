services:
  - type: web
    name: attest
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ATTEST_DB
        value: /var/data/attest.db
    disk:
      name: attest-data
      mountPath: /var/data
      sizeGB: 1
